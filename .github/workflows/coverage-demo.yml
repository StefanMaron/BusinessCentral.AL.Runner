name: Coverage Demo

on:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build AlRunner/

      - name: Run tests with coverage
        run: |
          echo "## AL Runner Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for test in 01-pure-function 02-record-operations 03-interface-injection 04-asserterror; do
            echo "::group::${test}"
            OUTPUT=$(dotnet run --no-build --project AlRunner -- --coverage "tests/${test}/src" "tests/${test}/test" 2>&1)
            echo "$OUTPUT"
            echo "::endgroup::"

            # Extract console coverage table for the summary
            COVERAGE_LINES=$(echo "$OUTPUT" | grep -E "^  (TOTAL|[A-Z])" | head -20)
            RESULTS=$(echo "$OUTPUT" | grep "^Results:")

            echo "### ${test}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$RESULTS" >> "$GITHUB_STEP_SUMMARY"
            echo "$COVERAGE_LINES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            mv cobertura.xml "cobertura-${test}.xml" 2>/dev/null || true
          done

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: cobertura-*.xml
