name: Publish to NuGet

# Single trigger: manual dispatch with explicit version.
# The workflow creates the tag itself after updating CHANGELOG — so there is no
# separate "push tag" step and no push-tag → re-trigger loop.
#
# Prerequisite (one-time repo setting):
#   Settings → Branches → branch protection rule for main →
#   enable "Allow GitHub Actions to bypass required pull requests"
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.22)'
        required: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Resolve BC versions
        id: resolve
        run: |
          BC_PREFIXES=$(cat .github/bc-versions.txt | grep -v '^#' | tr '\n' ' ')
          VERSIONS="[]"
          for prefix in $BC_PREFIXES; do
            FULL=$(dotnet run --project tools/DownloadArtifacts -- resolve-version "$prefix" dummy 2>/dev/null || true)
            if [ -n "$FULL" ]; then
              VERSIONS=$(echo "$VERSIONS" | python3 -c "import json,sys; v=json.load(sys.stdin); v.append('$FULL'); print(json.dumps(v))")
            fi
          done
          echo "matrix={\"bc-version\":$VERSIONS}" >> "$GITHUB_OUTPUT"

  test:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    name: Test BC ${{ matrix.bc-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build (auto-downloads BC ${{ matrix.bc-version }} DLLs)
        run: |
          dotnet build AlRunner.slnx -p:_BCVersion=${{ matrix.bc-version }}
          echo "BC_SERVICE_TIER_PATH=${HOME}/.local/share/al-runner/artifacts/${{ matrix.bc-version }}" >> "$GITHUB_ENV"

      - name: Run C# tests
        run: dotnet test AlRunner.Tests/AlRunner.Tests.csproj --no-build --framework net10.0 --verbosity minimal

      - name: Run AL test buckets
        run: |
          for bucket in tests/bucket-*/; do
            args=""
            for suite in "$bucket"*/; do
              [ -d "${suite}src"  ] && args="$args ${suite}src"
              for appdir in "${suite}"app*/; do
                [ -d "$appdir" ] && args="$args $appdir"
              done
              [ -d "${suite}test" ] && args="$args ${suite}test"
            done
            echo "=== $bucket ==="
            dotnet run --no-build --project AlRunner --framework net10.0 -- --strict --test-isolation method $args
          done

      - name: Run stubs test
        run: |
          dotnet run --no-build --project AlRunner --framework net10.0 -- --stubs tests/stubs/39-stubs/stubs tests/stubs/39-stubs/src tests/stubs/39-stubs/test

      - name: Verify intentional-failure fixture
        run: |
          dotnet run --no-build --project AlRunner --framework net10.0 -- \
            tests/excluded/06-intentional-failure/src tests/excluded/06-intentional-failure/test \
            || rc=$?
          [ "${rc:-0}" -eq 1 ] || { echo "Expected exit 1, got ${rc:-0}"; exit 1; }

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so git describe finds the previous tag
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}  # deploy key has "Always allow" bypass on the main ruleset

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate CHANGELOG section and update CHANGELOG.md
        id: changelog
        run: |
          export VERSION="${{ inputs.version }}"
          export DATE=$(date +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            export COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s")
          else
            export COMMITS=$(git log --pretty=format:"%s")
          fi

          # Categorise commits by conventional-commit prefix and build the section
          export SECTION=$(python3 - <<'PYEOF'
import os, re

version     = os.environ["VERSION"]
date        = os.environ["DATE"]
commits_raw = os.environ.get("COMMITS", "")

added, fixed, docs, changed = [], [], [], []
for line in commits_raw.splitlines():
    line = line.strip()
    if not line:
        continue
    line = re.sub(r'\s+\(#\d+\)$', '', line)   # strip PR number suffix
    lower = line.lower()
    if re.match(r'chore:\s*(release|update changelog)', lower):
        continue                                 # skip release-housekeeping
    if lower.startswith('feat:'):
        added.append('- ' + line[5:].strip())
    elif lower.startswith('fix:'):
        fixed.append('- ' + line[4:].strip())
    elif lower.startswith('docs:'):
        docs.append('- ' + line[5:].strip())
    elif lower.startswith('chore:'):
        pass                                     # skip internal chores
    else:
        changed.append('- ' + line)

out = [f'## [{version}] - {date}', '']
if added:
    out += ['### Added'] + added + ['']
if fixed:
    out += ['### Fixed'] + fixed + ['']
if docs:
    out += ['### Documentation'] + docs + ['']
if changed:
    out += ['### Changed'] + changed + ['']
print('\n'.join(out))
PYEOF
          )

          # Inject the new section into CHANGELOG.md after the [Unreleased] heading
          python3 - <<'PYEOF'
import os, re

section = os.environ["SECTION"]
with open("CHANGELOG.md", "r") as f:
    content = f.read()

updated = re.sub(
    r'(## \[Unreleased\]\n+)',
    r'\1' + section.rstrip() + '\n\n',
    content,
    count=1
)
with open("CHANGELOG.md", "w") as f:
    f.write(updated)
PYEOF

          # Store section as step output for the GitHub Release body
          {
            echo "notes<<EOF_NOTES"
            echo "$SECTION"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Commit CHANGELOG and push tag
        run: |
          VERSION="${{ inputs.version }}"
          git add CHANGELOG.md
          git commit -m "chore: release v${VERSION}"
          git push origin main
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Build and pack
        run: |
          dotnet build AlRunner/
          dotnet pack AlRunner/ -p:Version=${{ inputs.version }} -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: ./nupkg/*.nupkg
          draft: false
          prerelease: false

      - name: Summary
        run: |
          echo "## Published to NuGet" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ inputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Package:** [MSDyn365BC.AL.Runner](https://www.nuget.org/packages/MSDyn365BC.AL.Runner/${{ inputs.version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release:** [v${{ inputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }})" >> "$GITHUB_STEP_SUMMARY"
