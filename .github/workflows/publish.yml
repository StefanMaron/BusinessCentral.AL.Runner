name: Publish to NuGet

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.2.0)'
        required: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Resolve BC versions
        id: resolve
        run: |
          BC_PREFIXES="26.0 26.3 26.5 27.0 27.3 27.5"
          VERSIONS="[]"
          for prefix in $BC_PREFIXES; do
            FULL=$(dotnet run --project tools/DownloadArtifacts -- resolve-version "$prefix" dummy 2>/dev/null)
            if [ -n "$FULL" ]; then
              VERSIONS=$(echo "$VERSIONS" | python3 -c "import json,sys; v=json.load(sys.stdin); v.append('$FULL'); print(json.dumps(v))")
            fi
          done
          echo "matrix={\"bc-version\":$VERSIONS}" >> "$GITHUB_OUTPUT"

  test:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    name: Test BC ${{ matrix.bc-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Build (auto-downloads BC ${{ matrix.bc-version }} DLLs)
        run: |
          dotnet build AlRunner.slnx -p:_BCVersion=${{ matrix.bc-version }}
          echo "BC_SERVICE_TIER_PATH=${HOME}/.local/share/al-runner/artifacts/${{ matrix.bc-version }}" >> "$GITHUB_ENV"

      - name: Run C# tests (net8.0)
        run: dotnet test AlRunner.Tests/AlRunner.Tests.csproj --no-build --framework net8.0 --verbosity minimal

      - name: Run C# tests (net9.0)
        run: dotnet test AlRunner.Tests/AlRunner.Tests.csproj --no-build --framework net9.0 --verbosity minimal

      - name: Run all AL tests (net8.0)
        run: |
          # 06- = intentional failure fixture
          # 39- = stubs scenario — run separately with --stubs
          # 46- = missing-dep namespace-mismatch fixture — intentionally
          #        fails without --stubs; covered by C# MissingDepHintTests
          for s in $(ls -d tests/*/src | sed 's|tests/||;s|/src||' | grep -v '06-' | grep -v '39-' | grep -v '46-' | sort); do
            echo "--- $s ---"
            dotnet run --no-build --project AlRunner --framework net8.0 -- "tests/$s/src" "tests/$s/test" || {
              exit_code=$?
              [ $exit_code -eq 2 ] || exit $exit_code
            }
          done

      - name: Run all AL tests (net9.0)
        run: |
          for s in $(ls -d tests/*/src | sed 's|tests/||;s|/src||' | grep -v '06-' | grep -v '39-' | grep -v '46-' | sort); do
            echo "--- $s ---"
            dotnet run --no-build --project AlRunner --framework net9.0 -- "tests/$s/src" "tests/$s/test" || {
              exit_code=$?
              [ $exit_code -eq 2 ] || exit $exit_code
            }
          done

      - name: Run stubs test (net8.0)
        run: |
          dotnet run --no-build --project AlRunner --framework net8.0 -- --stubs tests/stubs/39-stubs/stubs tests/stubs/39-stubs/src tests/stubs/39-stubs/test

      - name: Run stubs test (net9.0)
        run: |
          dotnet run --no-build --project AlRunner --framework net9.0 -- --stubs tests/stubs/39-stubs/stubs tests/stubs/39-stubs/src tests/stubs/39-stubs/test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required by softprops/action-gh-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Extract from tag: v0.2.0 -> 0.2.0
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Grab the section starting at `## [VERSION]` up to (but not including) the next `## ` heading.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { printing=1; next }
            printing && $0 ~ "^## \\[" { exit }
            printing { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Build and pack
        run: |
          dotnet build AlRunner/
          dotnet pack AlRunner/ -p:Version=${{ steps.version.outputs.version }} -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        if: github.event_name == 'push'  # only on tag pushes, not workflow_dispatch
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: ./nupkg/*.nupkg
          draft: false
          prerelease: false

      - name: Summary
        run: |
          echo "## Published to NuGet" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Package:** [MSDyn365BC.AL.Runner](https://www.nuget.org/packages/MSDyn365BC.AL.Runner/${{ steps.version.outputs.version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release:** [${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> "$GITHUB_STEP_SUMMARY"
