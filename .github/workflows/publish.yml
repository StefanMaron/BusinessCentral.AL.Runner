name: Publish to NuGet

# Triggered manually only — supply the version and the workflow does everything:
# generates the CHANGELOG section, commits it to main, pushes the tag, runs
# tests, packs, pushes to NuGet, and creates the GitHub Release.
#
# The checkout step uses RELEASE_DEPLOY_KEY (a write-access deploy key) so the
# git push to main bypasses the branch ruleset ("Deploy keys" -> Always allow).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.23)'
        required: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.changelog.outputs.notes }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate CHANGELOG and push release commit + tag
        id: changelog
        run: |
          VERSION="${{ inputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          SECTION=$(VERSION="$VERSION" DATE="$(date +%Y-%m-%d)" COMMITS="$COMMITS" \
            python3 .github/scripts/generate_changelog.py)

          git add CHANGELOG.md
          git commit -m "chore: release v${VERSION}"
          git push origin main
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          {
            echo "notes<<EOF_NOTES"
            echo "$SECTION"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

  resolve-versions:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Resolve BC versions
        id: resolve
        run: |
          BC_PREFIXES=$(cat .github/bc-versions.txt | grep -v '^#' | tr '\n' ' ')
          VERSIONS="[]"
          for prefix in $BC_PREFIXES; do
            FULL=$(dotnet run --project tools/DownloadArtifacts -- resolve-version "$prefix" dummy 2>/dev/null || true)
            if [ -n "$FULL" ]; then
              VERSIONS=$(echo "$VERSIONS" | python3 -c "import json,sys; v=json.load(sys.stdin); v.append('$FULL'); print(json.dumps(v))")
            fi
          done
          echo "matrix={\"bc-version\":$VERSIONS}" >> "$GITHUB_OUTPUT"

  test:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    name: Test BC ${{ matrix.bc-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build (auto-downloads BC ${{ matrix.bc-version }} DLLs)
        run: |
          dotnet build AlRunner.slnx -p:_BCVersion=${{ matrix.bc-version }}
          echo "BC_SERVICE_TIER_PATH=${HOME}/.local/share/al-runner/artifacts/${{ matrix.bc-version }}" >> "$GITHUB_ENV"

      - name: Run C# tests
        run: dotnet test AlRunner.Tests/AlRunner.Tests.csproj --no-build --framework net10.0 --verbosity minimal

      - name: Run AL test buckets
        run: |
          for bucket in tests/bucket-*/; do
            args=""
            # Each bucket holds either thematic category subfolders
            # (bucket/<category>/<suite>/) or — when a single category would be
            # the only one — flat suites directly under the bucket
            # (bucket/<suite>/). Auto-detect per entry to mirror test-matrix.yml.
            for entry in "$bucket"*/; do
              if [ -d "${entry}src" ] || [ -d "${entry}test" ]; then
                # Flat layout: <entry> is the suite itself.
                [ -d "${entry}src"  ] && args="$args ${entry}src"
                for appdir in "${entry}"app*/; do
                  [ -d "$appdir" ] && args="$args $appdir"
                done
                [ -d "${entry}test" ] && args="$args ${entry}test"
              else
                # Categorized layout: <entry> is a category folder; descend.
                for suite in "$entry"*/; do
                  [ -d "${suite}src"  ] && args="$args ${suite}src"
                  for appdir in "${suite}"app*/; do
                    [ -d "$appdir" ] && args="$args $appdir"
                  done
                  [ -d "${suite}test" ] && args="$args ${suite}test"
                done
              fi
            done
            echo "=== $bucket ==="
            dotnet run --no-build --project AlRunner --framework net10.0 -- --strict --test-isolation method $args
          done

      - name: Run stubs test
        run: |
          dotnet run --no-build --project AlRunner --framework net10.0 -- --stubs tests/stubs/39-stubs/stubs tests/stubs/39-stubs/src tests/stubs/39-stubs/test

      - name: Verify intentional-failure fixture
        run: |
          dotnet run --no-build --project AlRunner --framework net10.0 -- \
            tests/excluded/06-intentional-failure/src tests/excluded/06-intentional-failure/test \
            || rc=$?
          [ "${rc:-0}" -eq 1 ] || { echo "Expected exit 1, got ${rc:-0}"; exit 1; }

  publish:
    needs: [prepare, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build and pack
        run: |
          dotnet build AlRunner/
          dotnet pack AlRunner/ -p:Version=${{ inputs.version }} -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ needs.prepare.outputs.notes }}
          files: ./nupkg/*.nupkg
          draft: false
          prerelease: false

      - name: Summary
        run: |
          echo "## Published to NuGet" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ inputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Package:** [MSDyn365BC.AL.Runner](https://www.nuget.org/packages/MSDyn365BC.AL.Runner/${{ inputs.version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release:** [v${{ inputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }})" >> "$GITHUB_STEP_SUMMARY"
