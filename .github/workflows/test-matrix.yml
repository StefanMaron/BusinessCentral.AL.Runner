name: Test Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Resolve BC versions
        id: resolve
        run: |
          # Read version prefixes from the single-source-of-truth config file
          BC_PREFIXES=$(cat .github/bc-versions.txt | grep -v '^#' | tr '\n' ' ')
          VERSIONS="[]"
          for prefix in $BC_PREFIXES; do
            FULL=$(dotnet run --project tools/DownloadArtifacts -- resolve-version "$prefix" dummy 2>/dev/null || true)
            if [ -n "$FULL" ]; then
              echo "  $prefix -> $FULL"
              VERSIONS=$(echo "$VERSIONS" | python3 -c "import json,sys; v=json.load(sys.stdin); v.append('$FULL'); print(json.dumps(v))")
            else
              echo "  $prefix -> FAILED (skipping)"
            fi
          done
          echo "matrix={\"bc-version\":$VERSIONS}" >> "$GITHUB_OUTPUT"
          echo "Matrix: $VERSIONS"

  test:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    name: BC ${{ matrix.bc-version }}
    env:
      BC_VERSION: ${{ matrix.bc-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build (auto-downloads BC ${{ matrix.bc-version }} DLLs)
        run: |
          dotnet build AlRunner.slnx -p:_BCVersion=${{ matrix.bc-version }}
          # Tell the runtime where the MSBuild target cached the DLLs
          echo "BC_SERVICE_TIER_PATH=${HOME}/.local/share/al-runner/artifacts/${{ matrix.bc-version }}" >> "$GITHUB_ENV"

      - name: Run C# tests
        run: dotnet test AlRunner.Tests/AlRunner.Tests.csproj --no-build --framework net10.0 --verbosity minimal

      - name: Run AL test buckets
        id: al-tests
        run: |
          total_passed=0
          total_failed=0
          total_ms=0

          for bucket in tests/bucket-*/; do
            args=""
            for suite in "$bucket"*/; do
              [ -d "${suite}src"  ] && args="$args ${suite}src"
              for appdir in "${suite}"app*/; do
                [ -d "$appdir" ] && args="$args $appdir"
              done
              [ -d "${suite}test" ] && args="$args ${suite}test"
            done
            echo "=== $bucket ==="
            start=$SECONDS
            output=$(dotnet run --no-build --project AlRunner --framework net10.0 -- --strict --test-isolation method $args 2>&1)
            elapsed=$(( SECONDS - start ))
            echo "$output"

            # Parse "N passed[, M failed] in X.Xs"
            passed=$(echo "$output" | grep -oP '\d+(?= passed)' || echo 0)
            failed=$(echo "$output" | grep -oP '\d+(?= failed)' || echo 0)
            total_passed=$(( total_passed + passed ))
            total_failed=$(( total_failed + failed ))
            total_ms=$(( total_ms + elapsed * 1000 ))

            if [ "$elapsed" -gt 60 ]; then
              echo "::error::Performance regression: $bucket took ${elapsed}s (limit: 60s)"
              exit 1
            fi
          done

          # Stubs test
          echo "=== stubs ==="
          start=$SECONDS
          output=$(dotnet run --no-build --project AlRunner --framework net10.0 -- --stubs tests/stubs/39-stubs/stubs tests/stubs/39-stubs/src tests/stubs/39-stubs/test 2>&1)
          elapsed=$(( SECONDS - start ))
          echo "$output"
          passed=$(echo "$output" | grep -oP '\d+(?= passed)' || echo 0)
          total_passed=$(( total_passed + passed ))
          total_ms=$(( total_ms + elapsed * 1000 ))

          # Format timing
          total_secs=$(python3 -c "print(f'{$total_ms / 1000:.1f}')")

          echo "total_passed=$total_passed" >> "$GITHUB_OUTPUT"
          echo "total_failed=$total_failed" >> "$GITHUB_OUTPUT"
          echo "total_secs=$total_secs" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Summary ==="
          echo "AL tests: $total_passed passed, $total_failed failed in ${total_secs}s"

      - name: Verify intentional-failure fixture
        run: |
          # This fixture must exit 1 (test failures). Any other exit code is a bug.
          # Use || to capture exit code without triggering set -e.
          dotnet run --no-build --project AlRunner --framework net10.0 -- \
            tests/excluded/06-intentional-failure/src tests/excluded/06-intentional-failure/test \
            || rc=$?
          [ "${rc:-0}" -eq 1 ] || { echo "Expected exit 1, got ${rc:-0}"; exit 1; }

  all-tests:
    name: All BC versions passed
    needs: [resolve-versions, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all matrix jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more BC version test jobs failed (result: ${{ needs.test.result }})"
            exit 1
          fi
          echo "All BC versions passed."

  update-badges:
    name: Update test badges
    needs: [resolve-versions, test, all-tests]
    if: github.ref == 'refs/heads/main' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Count AL test procedures and update badge
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Count test procedures in all bucket and stubs test files
          TESTS=$(grep -rch "^[[:space:]]*procedure " tests/bucket-*/*/test/*.al tests/stubs/*/test/*.al 2>/dev/null | awk '{s+=$1} END {print s+0}')
          echo "AL test procedures: $TESTS"

          BADGE_JSON=$(python3 -c "
          import json
          print(json.dumps({
              'schemaVersion': 1,
              'label': 'AL tests',
              'message': '${TESTS} passing',
              'color': 'brightgreen'
          }))
          ")

          gh api --method PATCH gists/2ea799885a3e3b3e6c42d6efbfaf9e3f \
            -f "files[test-badge.json][content]=$BADGE_JSON"

          echo "Updated badge: $TESTS tests"
