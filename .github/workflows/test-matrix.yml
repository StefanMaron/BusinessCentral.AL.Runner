name: Test Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Resolve BC versions
        id: resolve
        run: |
          # Resolve short version prefixes to full versions via Microsoft's index
          BC_PREFIXES="26.0 26.3 26.5 27.0 27.3 27.5"
          VERSIONS="[]"
          for prefix in $BC_PREFIXES; do
            FULL=$(dotnet run --project tools/DownloadArtifacts -- resolve-version "$prefix" dummy 2>/dev/null)
            if [ -n "$FULL" ]; then
              echo "  $prefix -> $FULL"
              VERSIONS=$(echo "$VERSIONS" | python3 -c "import json,sys; v=json.load(sys.stdin); v.append('$FULL'); print(json.dumps(v))")
            else
              echo "  $prefix -> FAILED (skipping)"
            fi
          done
          echo "matrix={\"bc-version\":$VERSIONS}" >> "$GITHUB_OUTPUT"
          echo "Matrix: $VERSIONS"

  test:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    name: BC ${{ matrix.bc-version }}
    env:
      BC_VERSION: ${{ matrix.bc-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (auto-downloads BC ${{ matrix.bc-version }} DLLs)
        run: |
          dotnet build AlRunner.slnx -p:_BCVersion=${{ matrix.bc-version }}
          # Tell the runtime where the MSBuild target cached the DLLs
          echo "BC_SERVICE_TIER_PATH=${HOME}/.local/share/al-runner/artifacts/${{ matrix.bc-version }}" >> "$GITHUB_ENV"

      - name: Run C# tests
        run: dotnet test AlRunner.Tests/AlRunner.Tests.csproj --no-build --verbosity minimal

      - name: Run all AL tests
        run: |
          # Run each test case individually so duplicate object IDs across test suites
          # don't cause false compilation failures.
          # 06- = intentional failure fixture (always fails, excluded)
          # 39- = stubs scenario — run separately with --stubs
          # 46- = missing-dep namespace-mismatch fixture — intentionally
          #        fails without --stubs; covered by C# MissingDepHintTests
          for s in $(ls -d tests/*/src | sed 's|tests/||;s|/src||' | grep -v '06-' | grep -v '39-' | grep -v '46-' | sort); do
            echo "--- $s ---"
            dotnet run --no-build --project AlRunner -- "tests/$s/src" "tests/$s/test"
          done

      - name: Run stubs test
        run: |
          dotnet run --no-build --project AlRunner -- --stubs tests/39-stubs/stubs tests/39-stubs/src tests/39-stubs/test
