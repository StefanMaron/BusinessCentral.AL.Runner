name: Test Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Resolve BC versions
        id: resolve
        run: |
          # Read version prefixes from the single-source-of-truth config file
          BC_PREFIXES=$(cat .github/bc-versions.txt | grep -v '^#' | tr '\n' ' ')
          VERSIONS="[]"
          for prefix in $BC_PREFIXES; do
            FULL=$(dotnet run --project tools/DownloadArtifacts -- resolve-version "$prefix" dummy 2>/dev/null || true)
            if [ -n "$FULL" ]; then
              echo "  $prefix -> $FULL"
              VERSIONS=$(echo "$VERSIONS" | python3 -c "import json,sys; v=json.load(sys.stdin); v.append('$FULL'); print(json.dumps(v))")
            else
              echo "  $prefix -> FAILED (skipping)"
            fi
          done
          echo "matrix={\"bc-version\":$VERSIONS}" >> "$GITHUB_OUTPUT"
          echo "Matrix: $VERSIONS"

  test:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    name: BC ${{ matrix.bc-version }}
    env:
      BC_VERSION: ${{ matrix.bc-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build (auto-downloads BC ${{ matrix.bc-version }} DLLs)
        run: |
          dotnet build AlRunner.slnx -p:_BCVersion=${{ matrix.bc-version }}
          # Tell the runtime where the MSBuild target cached the DLLs
          echo "BC_SERVICE_TIER_PATH=${HOME}/.local/share/al-runner/artifacts/${{ matrix.bc-version }}" >> "$GITHUB_ENV"

      - name: Run C# tests
        run: dotnet test AlRunner.Tests/AlRunner.Tests.csproj --no-build --framework net10.0 --verbosity minimal

      - name: Run AL test buckets
        run: |
          # Tests are organised into bucket-* directories. Each bucket is one al-runner
          # invocation — all suites in the bucket compile and run together.
          # Object IDs are unique within each bucket (bucket-1 and bucket-2 have no
          # overlapping IDs). Add bucket-3, bucket-4, ... when a bucket exceeds ~50 suites.
          for bucket in tests/bucket-*/; do
            args=""
            for suite in "$bucket"*/; do
              [ -d "${suite}src"  ] && args="$args ${suite}src"
              # Multi-app suites (e.g. cross-extension tests) use appA/, appB/, etc.
              for appdir in "${suite}"app*/; do
                [ -d "$appdir" ] && args="$args $appdir"
              done
              [ -d "${suite}test" ] && args="$args ${suite}test"
            done
            echo "=== $bucket ==="
            dotnet run --no-build --project AlRunner --framework net10.0 -- --strict $args
          done

      - name: Run stubs test
        run: |
          dotnet run --no-build --project AlRunner --framework net10.0 -- --stubs tests/stubs/39-stubs/stubs tests/stubs/39-stubs/src tests/stubs/39-stubs/test

      - name: Verify intentional-failure fixture
        run: |
          # This fixture must exit 1 (test failures). Any other exit code is a bug.
          # Use || to capture exit code without triggering set -e.
          dotnet run --no-build --project AlRunner --framework net10.0 -- \
            tests/excluded/06-intentional-failure/src tests/excluded/06-intentional-failure/test \
            || rc=$?
          [ "${rc:-0}" -eq 1 ] || { echo "Expected exit 1, got ${rc:-0}"; exit 1; }

  all-tests:
    name: All BC versions passed
    needs: [resolve-versions, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all matrix jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more BC version test jobs failed (result: ${{ needs.test.result }})"
            exit 1
          fi
          echo "All BC versions passed."
