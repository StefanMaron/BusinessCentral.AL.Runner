name: Samples (passing)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BC_ARTIFACT_VERSION: "27.5.46862.0"

jobs:
  test-samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install AL compiler
        run: dotnet tool install --global microsoft.dynamics.businesscentral.development.tools.linux --version 16.2.28.57946

      - name: Download BC Service Tier DLLs (range request)
        run: |
          ARTIFACT_URL="https://bcartifacts-exdbf9fwegejdqak.b02.azurefd.net/onprem/${BC_ARTIFACT_VERSION}/platform"
          TARGET_DIR="artifacts/onprem/${BC_ARTIFACT_VERSION}/platform/ServiceTier/PFiles64/Microsoft Dynamics NAV/270/Service"
          mkdir -p "${TARGET_DIR}"

          # Get total size via HEAD request
          TOTAL_SIZE=$(curl -sI "${ARTIFACT_URL}" | grep -i content-length | awk '{print $2}' | tr -d '\r')
          echo "Platform artifact size: ${TOTAL_SIZE} bytes"

          # Download only the 8 DLLs we need via individual range requests (~5MB vs ~1.2GB)
          python3 .github/scripts/download-bc-dlls.py "${ARTIFACT_URL}" "${TOTAL_SIZE}" "${TARGET_DIR}"

      - name: Build
        run: dotnet build AlRunner/

      - name: "Sample 01: Pure function tests"
        run: dotnet run --project AlRunner --no-build -- samples/01-pure-function/src samples/01-pure-function/test

      - name: "Sample 02: Record operations tests"
        run: dotnet run --project AlRunner --no-build -- samples/02-record-operations/src samples/02-record-operations/test

      - name: "Sample 03: Interface injection tests"
        run: dotnet run --project AlRunner --no-build -- samples/03-interface-injection/src samples/03-interface-injection/test

      - name: "Sample 04: asserterror tests"
        run: dotnet run --project AlRunner --no-build -- samples/04-asserterror/src samples/04-asserterror/test

      - name: "Sample 05: Known limitation tests"
        run: dotnet run --project AlRunner --no-build -- samples/05-known-limitation/src samples/05-known-limitation/test
