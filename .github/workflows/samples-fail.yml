# This pipeline is EXPECTED TO FAIL — it demonstrates error reporting.
# The sample 06-intentional-failure contains deliberately broken tests
# to show what AL Runner's test failure output looks like.
# Click through to the workflow run to see the error output format.

name: Samples (expected failure)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  expected-failure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # AL compiler and BC Service Tier DLLs are auto-downloaded during build.
      - name: Build
        run: dotnet build AlRunner/

      # BC Service Tier DLLs are auto-downloaded on first run via HTTP range requests.

      - name: "Sample 06: Intentional failure (EXPECTED TO FAIL)"
        run: |
          set +e
          OUTPUT=$(dotnet run --no-build --project AlRunner -- --coverage samples/06-intentional-failure/src samples/06-intentional-failure/test 2>&1)
          RUNNER_EXIT=$?
          echo "$OUTPUT"

          {
            echo "## Expected Failure Output"
            echo ""
            echo "This workflow intentionally runs broken tests to demonstrate error reporting."
            echo ""
            echo '```'
            echo "$OUTPUT" | grep -E "^(FAIL|PASS|ERROR|      |Results:)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit $RUNNER_EXIT
