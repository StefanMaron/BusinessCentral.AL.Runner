# This pipeline is EXPECTED TO FAIL — it demonstrates error reporting.
# The sample 06-intentional-failure contains deliberately broken tests
# to show what AL Runner's test failure output looks like.
# Click through to the workflow run to see the error output format.

name: Samples (expected failure)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BC_ARTIFACT_VERSION: "27.5.46862.0"

jobs:
  expected-failure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install AL compiler
        run: dotnet tool install --global microsoft.dynamics.businesscentral.development.tools.linux --version 16.2.28.57946

      - name: Download BC Service Tier DLLs (range request)
        run: |
          ARTIFACT_URL="https://bcartifacts-exdbf9fwegejdqak.b02.azurefd.net/onprem/${BC_ARTIFACT_VERSION}/platform"
          TARGET_DIR="artifacts/onprem/${BC_ARTIFACT_VERSION}/platform/ServiceTier/PFiles64/Microsoft Dynamics NAV/270/Service"
          mkdir -p "${TARGET_DIR}"

          TOTAL_SIZE=$(curl -sI "${ARTIFACT_URL}" | grep -i content-length | awk '{print $2}' | tr -d '\r')
          python3 .github/scripts/download-bc-dlls.py "${ARTIFACT_URL}" "${TOTAL_SIZE}" "${TARGET_DIR}"

      - name: Build
        run: dotnet build AlRunner/

      - name: "Sample 06: Intentional failure (EXPECTED TO FAIL)"
        run: |
          set +e
          OUTPUT=$(dotnet run --no-build --project AlRunner -- --coverage samples/06-intentional-failure/src samples/06-intentional-failure/test 2>&1)
          RUNNER_EXIT=$?
          echo "$OUTPUT"

          # Write summary showing the failure output — this is the whole point of this workflow
          {
            echo "## Expected Failure Output"
            echo ""
            echo "This workflow intentionally runs broken tests to demonstrate error reporting."
            echo ""
            echo '```'
            echo "$OUTPUT" | grep -E "^(FAIL|PASS|ERROR|      |Results:)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail the step (expected)
          exit $RUNNER_EXIT
