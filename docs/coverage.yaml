Codeunit.GracefulFallback:
  layer: runtime-api
  category: codeunit
  status: covered
  notes: Missing codeunits (not in the compiled assembly) are now a soft warning instead of a fatal throw. RunCodeunit, Run(), and Invoke() log a warning to stderr and return a default value (null/true), allowing the calling test to continue. Tests prove execution continues after Codeunit.Run(99999) and Codeunit.Run(27).
  tests:
    - tests/bucket-1/128-codeunit-not-found

Codeunit.InitEvents:
  layer: runtime-api
  category: codeunit
  status: covered
  notes: >
    --init-events CLI flag fires BC lifecycle integration events (OnCompanyInitialize from Codeunit 27, OnInstallAppPerCompany from Codeunit 2) before each test (after per-test table reset). Allows [EventSubscriber] handlers on system events to perform setup work without the system codeunits being present. Subscriber code is discovered by reflection on compiled classes.
  tests:
    - tests/init-events/40-init-events

Table.ImplicitDbEventByRefParams:
  layer: runtime-api
  category: table
  status: covered
  notes: >
    InvokeSubscriber now coerces plain-T event args to ByRef<T> when the subscriber
    method parameter is ByRef<T>. This fixes crashes for subscribers that declare
    "var RunTrigger: Boolean" (BC emits ByRef<bool>) for implicit DB trigger events
    (OnBefore/AfterInsertEvent, OnBefore/AfterModifyEvent, OnBefore/AfterDeleteEvent).
    Without the fix, method.Invoke threw ArgumentException:
    "Object of type 'System.Boolean' cannot be converted to type
    'Microsoft.Dynamics.Nav.Runtime.ByRef`1[System.Boolean]'".
    Also handles value-type parameters with null args (fills in default(T)).
  tests:
    - tests/bucket-2/225-db-event-byref-params

ConvertArgInternal.ByRefVariantRecord:
  layer: runtime-api
  category: codeunit
  status: covered
  notes: >
    ConvertArgInternal now handles ByRef<T> target types. When the call site passes a
    raw MockRecordHandle (or any non-ByRef value) where ByRef<MockVariant> is expected —
    as happens when AL passes a Record to a "var Variant" parameter — the method converts
    the arg to T (e.g. MockRecordHandle → MockVariant) and wraps it in ByRef<T> using
    AlCompat.MakeByRef<T>. Without the fix, method.Invoke threw ArgumentException:
    "Object of type 'AlRunner.Runtime.MockRecordHandle' cannot be converted to type
    'Microsoft.Dynamics.Nav.Runtime.ByRef`1[AlRunner.Runtime.MockVariant]'".
    AlCompat.MakeByRef was also changed from private to internal to enable cross-class use.
  tests:
    - tests/bucket-1/100-byref-variant-record

AlCompat.ObjectToExactNavValue:
  layer: runtime-api
  category: Boolean
  status: covered
  notes: >
    ALCompiler.ObjectToExactNavValue<NavText>(boolVar) was emitting (NavText)(object)boolVar
    which throws InvalidCastException at runtime (bool → NavText). The rewriter now
    redirects these calls to AlCompat.ObjectToExactNavValue<T>() which handles bool→NavText
    via "Yes"/"No" conversion. Also adds a 2-arg NavIndirectValueToNavValue<T>(value, metadata)
    overload (the 1-arg overload already existed). Fixes ~37 tests that crashed with
    "Unable to cast object of type 'System.Boolean' to type
    'Microsoft.Dynamics.Nav.Runtime.NavText'".
  tests:
    - tests/bucket-1/293-variant-to-navtext

Executor.TestIsolation:
  layer: runtime-api
  category: executor
  status: covered
  notes: >
    --test-isolation codeunit|method CLI flag controls table reset granularity.
    codeunit (BC default): tables reset between test codeunits, shared within codeunit.
    method: tables reset before every test method (old al-runner behavior).
    CI runs buckets with --test-isolation method to preserve existing test expectations.
    The flag is documented in --guide output.
  tests:
    - tests/bucket-2/226-codeunit-isolation

Codeunit.InitEventsPublisherIDs:
  layer: runtime-api
  category: codeunit
  status: covered
  notes: >
    --init-events now fires OnCompanyInitialize on BOTH publisher codeunit 2 AND 27.
    BC has used both IDs across versions; firing only one missed subscribers registered
    under the other ID. Also fires OnInstallAppPerDatabase and OnInstallAppPerCompany
    from Codeunit 2000000010. Init events fire once per isolation boundary (per codeunit
    in codeunit mode, per method in method mode).
  tests:
    - tests/init-events/40-init-events

Executor.UserTableSeed:
  layer: runtime-api
  category: executor
  status: covered
  notes: >
    The runner pre-seeds the User system table (2000000120) after every table reset.
    One row is inserted with "User Security ID" = the stable AlCompat.UserSecurityId()
    GUID (22222222-2222-2222-2222-222222222222) and "User Name" = AlScope.UserId
    (default "TESTUSER", configurable via --user-id). This allows AL code that calls
    User.Get(UserSecurityId()) to succeed without a "record not found" error.
    The seeding is idempotent — multiple calls without an intervening ResetAll() are
    safe. Tests that need a custom User record can Insert() additional rows or modify
    the seeded row.
  tests:
    - tests/bucket-2/227-user-table-seed

Executor.InitEventsIdempotent:
  layer: runtime-api
  category: executor
  status: covered
  notes: >
    The runner's init-event firing (--init-events) now silently swallows
    "record already exists" errors thrown by subscribers. Real-world extension
    subscribers sometimes unconditionally call Record.Insert() without a prior
    Get/FindFirst guard. Because the runner fires both codeunit-2 and codeunit-27
    OnCompanyInitialize events in a single init cycle, a subscriber registered for
    both (or two subscribers inserting the same primary key) would throw on the
    second Insert(). The fix wraps each FireEvent call during init-event firing in
    a try/catch that discards duplicate-PK errors; all other exceptions still
    propagate normally.
  tests:
    - tests/init-events/41-init-events-idempotent

Executor.ScopeCtorExtraParams:
  layer: runtime-api
  category: executor
  status: covered
  notes: >
    RunTests() now handles scope constructors with more than one parameter.
    The BC compiler generates a _Scope_ class for every procedure, including
    helpers in test codeunits whose names start with "Test" (so the executor
    picks them up via the "Test*" fallback heuristic). If such a helper has AL
    parameters, the generated constructor is
      (ParentType parent, ParamType1 p1, ParamType2 p2, …)
    rather than the usual single-arg form. Previously, RunTests() always called
    ctors[0].Invoke(new[] { parent }) which threw "Parameter count mismatch".
    The fix supplies the parent as the first arg and provides default values
    (Activator.CreateInstance for value types, null for reference types) for
    any additional parameters, mirroring the logic already present in RunOnRun().
  tests:
    - tests/bucket-3/01-executor-ctor-params

AlCompat.InitializeUninitializedObject:
  layer: runtime-api
  category: event-subscriber
  status: covered
  notes: >
    GetUninitializedObject skips constructors, leaving backing fields for AL global
    variables null. Both FireEvent (event subscriber dispatch) and TryFireRecordTrigger
    (record trigger firing) call GetUninitializedObject to create fresh instances.
    The shared helper InitializeUninitializedObject: (1) calls InitializeComponent and
    InitializeGlobalVariables via reflection so field initializers run, then (2) walks
    all instance fields and default-initializes any remaining null reference-type field
    (MockRecordHandle -> new MockRecordHandle(0); other types via parameterless ctor).
    This prevents NullReferenceException when trigger/subscriber bodies access table
    global variables (var section on a table object) or codeunit global variables that
    are not covered by InitializeComponent. FireEvent already called InitializeComponent;
    TryFireRecordTrigger previously did not — the fix adds the call there too.
  tests:
    - tests/bucket-2/100-uninit-field-fix
    - tests/bucket-2/101-validate-uninit

MockCodeunitHandle.InvokeAssert130002:
  layer: runtime-api
  category: test-toolkit
  status: covered
  notes: >
    Route codeunit 130002 (the real BC "Library Assert" ID) to MockAssert,
    matching the existing routing for IDs 130, 131, and 130000. External
    projects compiled against BC's real test toolkit reference 130002 rather
    than the runner's built-in stub ID 130.
  tests:
    - tests/bucket-2/103-assert-130002

RoslynRewriter.CompareToEquality:
  layer: syntax
  category: rewriter
  status: covered
  notes: >
    BC emits case-statement Text/Code comparisons as x.CompareTo(y) == 0.
    NavStringValue.CompareTo throws NullReferenceException in standalone mode
    (BC runtime DLL limitation). The rewriter transforms x.CompareTo(y) == 0
    to x == y (and != 0 to x != y). The == operator works correctly standalone.
  tests:
    - tests/bucket-2/105-validate-case

DepCompiler.CompileDep:
  layer: runtime-api
  category: dependency-execution
  status: covered
  notes: >
    --compile-dep compiles a dependency .app package (or AL source directory)
    through the full AL→C#→rewrite→Roslyn pipeline and produces a .dll on disk.
    The DLL uses the same mock types as the main test assembly. Supports caching
    by app identity (skips if DLL already exists). Output DLLs can be loaded via
    --dep-dlls for runtime execution of dependency codeunits.
  tests:
    - tests/dep-dlls

MockCodeunitHandle.DependencyAssemblies:
  layer: runtime-api
  category: dependency-execution
  status: covered
  notes: >
    --dep-dlls loads pre-compiled dependency DLLs into the AssemblyLoadContext.
    FindCodeunitType, FireEvent, TryFireRecordTrigger, and type lookups in
    MockFormHandle/MockReportHandle/MockPagePartHandle all search dependency
    assemblies when a type is not found in the main assembly.
  tests:
    - tests/dep-dlls

MockRecordHandle.TriggerRecursionGuard:
  layer: runtime-api
  category: record-trigger
  status: covered
  notes: >
    Prevents StackOverflowException when an OnModify/OnInsert/OnDelete trigger
    calls Modify/Insert/Delete on the same table, which would re-fire the trigger
    recursively. In real BC, triggers do not re-fire recursively. The guard uses a
    ThreadStatic HashSet of (tableId, triggerName) to detect re-entry.
  tests:
    - tests/bucket-2/108-trigger-recursion

MockCodeunitHandle.SingleInstance:
  layer: runtime-api
  category: codeunit-dispatch
  status: covered
  notes: >
    SingleInstance=true codeunits share one instance per session (per test codeunit).
    The rewriter preserves the IsSingleInstance static property (override→static).
    MockCodeunitHandle caches instances in a static dictionary, reused by EnsureInstance
    and event subscriber dispatch. Reset between test codeunits.
  tests: []

Pipeline.RichAutoStubs:
  layer: runtime-api
  category: auto-stub
  status: covered
  notes: >
    Auto-stubs now read method signatures from SymbolReference.json in .app packages
    and generate C# classes with proper method stubs (returning defaults) instead of
    empty classes. This eliminates "Method with member ID not found" errors for
    dependency codeunits. The arg-count fallback in MockCodeunitHandle.Invoke
    dispatches to these methods at runtime.
  tests:
    - tests/bucket-2/109-rich-auto-stub

MockCodeunitHandle.LibraryTestInitialize:
  layer: runtime-api
  category: test-toolkit
  status: covered
  notes: >
    AL stub for codeunit 132250 (Library - Test Initialize). Provides three
    integration event publishers (OnTestInitialize, OnBeforeTestSuiteInitialize,
    OnAfterTestSuiteInitialize) used by BC test codeunits for setup hooks.
  tests:
    - tests/bucket-2/107-library-test-init

MockCodeunitHandle.MethodCache:
  layer: runtime-api
  category: performance
  status: covered
  notes: >
    ConcurrentDictionary<(Type,int),MethodInfo?> caches the (codeunitType, memberId)
    -> MethodInfo lookup in MockCodeunitHandle.Invoke. Previously, every call scanned
    all nested scope types to resolve the method — with 7,699 Invoke calls per run,
    the cache eliminates O(N) nested-type scans after the first call per (type,member)
    pair. The expensive StackTrace() fallback was also removed; the primary cache
    handles all normal paths, and the arg-count fallback handles auto-stubs.
  tests: []

MockRecordHandle.TriggerCache:
  layer: runtime-api
  category: performance
  status: covered
  notes: >
    ConcurrentDictionary<(Type,string),TriggerReflectionInfo> caches GetField and
    GetMethod results in TryFireRecordTriggerCore. With 1,093 trigger invocations
    per run, each previously doing 3 reflection lookups (RecField, XRecField,
    TriggerMethod), the cache ensures those lookups happen at most once per
    (recordType, triggerName) combination. Early-out when TriggerMethod==null
    avoids creating an uninitialized object for record types with no trigger body.
  tests: []

Pipeline.StubsMainPass:
  layer: runtime-api
  category: performance
  status: covered
  notes: >
    Dependency stub AL files (--stubs <dir>) are now compiled in the same
    TranspileMulti call as the user's source, instead of a separate compilation
    that reloaded all .app packages from disk. Saves ~2.3s per run when stubs
    are present. The existing AL0275 reactive conflict resolver in TranspileMulti
    already handles stub-vs-package conflicts: it drops the conflicting package
    so the stub wins. GetSeparateStubSources() helper removed — no longer needed.
  tests:
    - tests/stubs/39-stubs

StubGenerator.SymbolTablePass:
  layer: runtime-api
  category: generate-stubs
  status: covered
  notes: >
    --generate-stubs now builds a minimal BC Compilation against the packages
    directory and passes it to StubGenerator.Generate(). A second pass after
    the SymbolReference.json loop calls GetApplicationObjectTypeSymbolsAcrossModules
    (via reflection) to enumerate all codeunits visible to the BC compiler,
    including platform/system codeunits (Rest Client, No. Series Batch, etc.)
    that have no SymbolReference.json in their .app file. These stubs are written
    to disk and counted in the new GeneratedFromSymbolTable field of GenerateResult.
    Falls back gracefully to zero extra stubs when compilation is unavailable.
  tests: []

RoslynRewriter.NavMediaSystemRecord:
  layer: runtime-api
  category: rewriter
  status: covered
  notes: >
    BC emits NavMediaSystemRecord as the base class for system media tables
    (e.g. "Tenant Media", table 2000000184). NavMediaSystemRecord has a
    7-arg constructor requiring ITreeObject, NCLMetaTable, NavRecord, string,
    SecurityFiltering — all unavailable in standalone mode. The rewriter now
    treats NavMediaSystemRecord identically to NavRecord: marks the containing
    class as a record class (for Rec/xRec table-ID tracking) and strips it
    from the base class list. The existing constructor-removal rule (triggered
    by ITreeObject parent parameters) handles the ctor. Closes #1188.
  tests:
    - tests/bucket-2/100-tenant-media

MockRecordHandle.CoerceToExpectedType.NavOptionToNavText:
  layer: runtime-api
  category: record-field
  status: covered
  notes: >
    When an Enum/Option field value (NavOption) is assigned to a Text field slot
    via FieldRef.Value := EnumFieldRef.Value, MockRecordRef.SetFieldValue calls
    SetFieldValueSafe(textFieldNo, NavType.Text, navOptionValue). Previously,
    CoerceToExpectedType stored NavOption as-is; a subsequent direct field read
    emitting (NavText)GetFieldValueSafe(textFieldNo, NavType.Text) threw
    "Unable to cast NavOption to NavText" (issue #1199). Fix converts NavOption
    to NavText using the ordinal integer as a string, consistent with
    AlCompat.Format() for NavOption. Also fixed ConvertArgInternal in
    MockCodeunitHandle for the same NavOption → NavText coercion when NavOption
    is passed to a reflected method expecting NavText.
  tests:
    - tests/bucket-2/235-navoption-to-navtext
